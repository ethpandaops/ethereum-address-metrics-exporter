version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - bidichk
    - bodyclose
    - copyloopvar
    - cyclop
    - dupword
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - fatcontext
    - funlen
    - goconst
    - gocognit
    - gocritic
    - gosec
    - govet
    - ineffassign
    - intrange
    - misspell
    - modernize
    - nestif
    - nilerr
    - noctx
    - nolintlint
    - perfsprint
    - predeclared
    - revive
    - sloglint
    - staticcheck
    - tagliatelle
    - testifylint
    - tparallel
    - unconvert
    - usetesting
    - unparam
    - unused
    - usestdlibvars
    - wastedassign
    - whitespace

  settings:
    cyclop:
      max-complexity: 30

    funlen:
      lines: 100
      statements: 50

    gocognit:
      min-complexity: 20

    errcheck:
      check-type-assertions: true

    tagliatelle:
      case:
        rules:
          yaml: camel
          json: camel

    revive:
      rules:
        - name: unexported-return
          disabled: true

    govet:
      enable-all: true
      disable:
        - fieldalignment
      settings:
        shadow:
          strict: true

    nolintlint:
      require-explanation: true
      require-specific: true

    sloglint:
      no-global: all
      context: scope

    staticcheck:
      checks:
        - all

  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ethpandaops/ethereum-address-metrics-exporter
